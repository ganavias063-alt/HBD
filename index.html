<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Pallavi 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #c9954c;
      --gold-light: #f0d080;
      --rose:       #e8799a;
      --rose-light: #ffb3c6;
      --cream:      #fdf6ee;
      --deep:       #1a0a10;
    }

    html, body {
      height: 100%;
      font-family: 'Cormorant Garamond', serif;
      background: var(--deep);
      color: var(--cream);
      overflow: hidden;
    }

    /* ── LOADER ── */
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(ellipse at center, #2d1020 0%, #080205 100%);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.9s ease;
    }
    #loader.out { opacity: 0; pointer-events: none; }
    .loader-inner { text-align: center; animation: ldIn .5s ease both; }
    @keyframes ldIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; } }
    .loader-rose { font-size: 3.5rem; display: inline-block; animation: spin 2s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-family: 'Dancing Script', cursive; font-size: 1.6rem; color: var(--gold-light); margin-bottom: 1.4rem; }
    .loader-bar  { width: 200px; height: 3px; background: rgba(255,255,255,.1); border-radius: 3px; margin: 0 auto; overflow: hidden; }
    .loader-fill { height: 100%; background: linear-gradient(90deg, var(--rose), var(--gold)); animation: lfill 2s ease forwards; }
    @keyframes lfill { from { width:0; } to { width:100%; } }

    /* ── CANVAS ── */
    canvas { position: fixed; inset: 0; pointer-events: none; }
    #fw-cvs  { z-index: 10; }
    #cf-cvs  { z-index: 11; }

    /* ── FLOATING LAYERS ── */
    #balloons, #particles, #petals {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden;
    }
    #balloons  { z-index: 12; }
    #particles { z-index: 8; }
    #petals    { z-index: 9; }

    .balloon {
      position: absolute; bottom: -120px;
      animation: riseUp linear infinite;
    }
    @keyframes riseUp {
      0%   { transform: translateY(0) translateX(0); opacity:.85; }
      50%  { transform: translateY(-50vh) translateX(18px); }
      100% { transform: translateY(-110vh) translateX(-10px); opacity:0; }
    }
    .particle {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, var(--gold-light), transparent);
      animation: floatP ease-in-out infinite;
    }
    @keyframes floatP {
      0%   { opacity:0; transform: translateY(0) scale(.5); }
      20%  { opacity:.6; }
      80%  { opacity:.3; }
      100% { opacity:0; transform: translateY(-80vh) scale(1); }
    }
    .petal {
      position: absolute; top: -50px;
      animation: petalFall linear infinite;
    }
    @keyframes petalFall {
      0%   { opacity:0; transform: translateY(-50px) rotate(0deg) translateX(0); }
      10%  { opacity:.7; }
      90%  { opacity:.4; }
      100% { opacity:0; transform: translateY(110vh) rotate(720deg) translateX(60px); }
    }

    /* ── MUSIC BTN ── */
    #music-btn {
      position: fixed; bottom: 24px; right: 24px; z-index: 500;
      width: 52px; height: 52px;
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.4rem;
      box-shadow: 0 0 20px rgba(201,149,76,.3);
      transition: box-shadow .3s, transform .2s;
    }
    #music-btn:hover { box-shadow: 0 0 35px rgba(201,149,76,.6); transform: scale(1.1); }
    #music-btn.playing { animation: mpulse 1.5s ease-in-out infinite; }
    @keyframes mpulse {
      0%,100% { box-shadow: 0 0 20px rgba(232,121,154,.4); }
      50%      { box-shadow: 0 0 45px rgba(232,121,154,.9), 0 0 60px rgba(201,149,76,.4); }
    }

    /* ── HERO PAGE ── */
    #page1 {
      position: relative; min-height: 100svh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem 1.5rem 3rem;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: -20px;
      background: url('assets/images/1.jpg') center/cover no-repeat;
      filter: blur(18px) brightness(.28) saturate(1.5);
      transform: scale(1.08);
      z-index: 0;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 55%, rgba(45,16,32,.55) 0%, rgba(8,2,5,.88) 100%);
      z-index: 1;
    }

    /* photo */
    .hero-photo-wrap { position: relative; z-index: 2; margin-bottom: 1.8rem; animation: photoIn 1.2s cubic-bezier(.22,1,.36,1) .3s both; }
    @keyframes photoIn { from { opacity:0; transform:scale(.7) translateY(30px); } to { opacity:1; transform:none; } }
    .photo-ring {
      width: 190px; height: 190px; border-radius: 50%; padding: 4px;
      background: linear-gradient(135deg, var(--gold), var(--rose), var(--gold-light), var(--rose-light));
      box-shadow: 0 0 60px rgba(232,121,154,.5), 0 0 100px rgba(201,149,76,.3);
      animation: ringGlow 3s ease-in-out infinite;
    }
    @keyframes ringGlow {
      0%,100% { box-shadow: 0 0 60px rgba(232,121,154,.5), 0 0 100px rgba(201,149,76,.3); }
      50%      { box-shadow: 0 0 90px rgba(232,121,154,.8), 0 0 140px rgba(201,149,76,.5); }
    }
    .photo-ring img {
      width: 100%; height: 100%; border-radius: 50%;
      object-fit: cover; object-position: top;
      border: 3px solid rgba(255,255,255,.12);
    }

    /* text */
    .hero-content { position: relative; z-index: 2; animation: contentIn 1.2s cubic-bezier(.22,1,.36,1) .6s both; }
    @keyframes contentIn { from { opacity:0; transform:translateY(40px); } to { opacity:1; transform:none; } }

    .eyebrow {
      font-family: 'Lato', sans-serif; font-size: .75rem;
      letter-spacing: .28em; text-transform: uppercase;
      color: var(--gold); opacity: .8; margin-bottom: .9rem;
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 8vw, 4.8rem);
      font-weight: 700; line-height: 1.1;
      color: var(--cream); margin-bottom: .4rem;
      text-shadow: 0 0 40px rgba(232,121,154,.4);
    }
    .hero-name {
      font-style: italic; display: block;
      background: linear-gradient(135deg, var(--gold-light), var(--rose-light), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: var(--rose-light); margin-bottom: 2.2rem;
    }

    /* memories photo */
    .memory-strip {
      position: relative; z-index: 2;
      max-width: 320px; margin: 0 auto 2.5rem;
      animation: contentIn 1.2s cubic-bezier(.22,1,.36,1) .9s both;
    }
    .glass-frame {
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 20px; padding: 1rem 1rem 1.4rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 50px rgba(232,121,154,.12), inset 0 1px 0 rgba(255,255,255,.1);
    }
    .glass-frame img {
      width: 100%; border-radius: 12px; display: block;
      object-fit: cover; max-height: 200px;
    }
    .frame-cap {
      font-family: 'Dancing Script', cursive;
      font-size: 1rem; color: var(--rose-light);
      text-align: center; margin-top: .9rem; line-height: 1.5;
    }

    /* ── CTA BUTTON ── */
    .btn-letter {
      display: inline-flex; align-items: center; gap: .6rem;
      padding: 1.1rem 2.6rem;
      background: linear-gradient(135deg, var(--rose), var(--gold));
      color: #fff; font-family: 'Lato', sans-serif;
      font-size: 1rem; font-weight: 400;
      letter-spacing: .12em; text-decoration: none;
      border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 0 30px rgba(232,121,154,.5), 0 8px 32px rgba(0,0,0,.3);
      transition: transform .2s, box-shadow .3s;
      position: relative; overflow: hidden;
      animation: btnPulse 2.5s ease-in-out infinite;
    }
    @keyframes btnPulse {
      0%,100% { box-shadow: 0 0 30px rgba(232,121,154,.5), 0 8px 32px rgba(0,0,0,.3); }
      50%      { box-shadow: 0 0 60px rgba(232,121,154,.85), 0 0 80px rgba(201,149,76,.35), 0 8px 32px rgba(0,0,0,.3); }
    }
    .btn-letter::before {
      content:''; position:absolute; inset:0;
      background: linear-gradient(135deg, rgba(255,255,255,.2), transparent);
      border-radius: inherit;
    }
    .btn-letter:hover { transform: translateY(-3px) scale(1.04); }
    .btn-letter:active { transform: scale(.97); }
    .btn-letter .btn-icon { font-size: 1.3rem; }

    /* scroll bounce arrow (hidden — overflow:hidden but nice UX cue) */
    .scroll-hint {
      position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.35); font-size: 1.2rem; z-index: 2;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(8px); }
    }

    /* ── PAGE TRANSITION OUT ── */
    #page1.go-out {
      animation: pageOut .7s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes pageOut {
      0%   { opacity:1; transform:scale(1); }
      100% { opacity:0; transform:scale(1.06); }
    }

    @media (max-width:480px) {
      .photo-ring { width:150px; height:150px; }
      .memory-strip { max-width:280px; }
    }
    @media (prefers-reduced-motion:reduce) {
      *, *::before, *::after { animation-duration:.01ms !important; }
    }
  </style>
</head>
<body>

  <!-- LOADER -->
  <div id="loader">
    <div class="loader-inner">
      <div class="loader-rose">🌸</div>
      <div class="loader-text">A Special Day Awaits...</div>
      <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>
  </div>

  <!-- CANVAS -->
  <canvas id="fw-cvs"></canvas>
  <canvas id="cf-cvs"></canvas>

  <!-- FLOATERS -->
  <div id="balloons"></div>
  <div id="particles"></div>
  <div id="petals"></div>

  <!-- MUSIC -->
  <div id="music-btn"><span id="music-icon">🎵</span></div>
  <audio id="bg-music" loop src="assets/music/3.mp3"></audio>

  <!-- ══════════ PAGE 1 ══════════ -->
  <div id="page1">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>

    <!-- Hero photo -->
    <div class="hero-photo-wrap">
      <div class="photo-ring">
        <img src="assets/images/1.jpg" alt="Pallavi" />
      </div>
    </div>

    <!-- Text -->
    <div class="hero-content">
      <p class="eyebrow">✨ A Very Special Day ✨</p>
      <h1 class="hero-title">
        Happy Birthday<br>
        <span class="hero-name">Pallavi</span> 🎉
      </h1>
      <p class="hero-sub">Today is all about you ❤️</p>

      <!-- Memories photo -->
      <div class="memory-strip">
        <div class="glass-frame">
          <img src="assets/images/2.jpg" alt="Sisters" />
          <p class="frame-cap">Two Sisters. Countless Memories. Endless Love ❤️</p>
        </div>
      </div>

      <!-- CTA to letter page -->
      <button class="btn-letter" id="go-letter">
        <span class="btn-icon">💌</span>
        A Letter For You
        <span class="btn-icon">💌</span>
      </button>
    </div>

    <div class="scroll-hint">✦</div>
  </div>

  <script>
  'use strict';

  /* ── CANVAS SETUP ── */
  const fwCvs = document.getElementById('fw-cvs');
  const cfCvs = document.getElementById('cf-cvs');
  const fwCtx = fwCvs.getContext('2d');
  const cfCtx = cfCvs.getContext('2d');
  function resize() {
    [fwCvs, cfCvs].forEach(c => { c.width = window.innerWidth; c.height = window.innerHeight; });
  }
  resize();
  window.addEventListener('resize', resize);

  /* ── LOADER ── */
  setTimeout(() => {
    document.getElementById('loader').classList.add('out');
    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
      kickoff();
    }, 950);
  }, 2200);

  function kickoff() {
    launchFireworks(18, 280);
    launchConfetti(true);
    startBalloons();
    startParticles();
    startPetals();
  }

  /* ── MUSIC ── */
  const music     = document.getElementById('bg-music');
  const musicBtn  = document.getElementById('music-btn');
  const musicIcon = document.getElementById('music-icon');
  let musicOn     = false;
  let musicInited = false;

  function tryMusic() {
    if (musicInited) return;
    musicInited = true;
    music.volume = 0.42;
    music.play().then(() => { musicOn=true; musicBtn.classList.add('playing'); }).catch(() => { musicInited=false; });
  }
  musicBtn.addEventListener('click', () => {
    if (!musicInited) { tryMusic(); return; }
    if (musicOn) { music.pause(); musicOn=false; musicBtn.classList.remove('playing'); musicIcon.textContent='🔇'; }
    else          { music.play(); musicOn=true;  musicBtn.classList.add('playing');    musicIcon.textContent='🎵'; }
  });
  ['scroll','click','touchstart','keydown'].forEach(e => document.addEventListener(e, tryMusic, {once:true}));

  /* ── FIREWORKS ── */
  let fwActive=false, rockets=[], fwParts=[];

  class FWParticle {
    constructor(x,y,color) {
      this.x=x; this.y=y;
      const a=Math.random()*Math.PI*2, s=Math.random()*6+2;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.alpha=1; this.decay=Math.random()*.015+.008;
      this.color=color; this.size=Math.random()*3+1; this.g=.12;
    }
    update() { this.x+=this.vx; this.y+=this.vy; this.vy+=this.g; this.vx*=.98; this.alpha-=this.decay; }
    draw(c) {
      c.globalAlpha=Math.max(0,this.alpha); c.fillStyle=this.color;
      c.shadowColor=this.color; c.shadowBlur=8;
      c.beginPath(); c.arc(this.x,this.y,this.size,0,Math.PI*2); c.fill();
      c.shadowBlur=0;
    }
  }
  class Rocket {
    constructor() {
      this.x=Math.random()*window.innerWidth; this.y=window.innerHeight;
      this.vy=-(Math.random()*8+10); this.vx=(Math.random()-.5)*3;
      this.targetY=Math.random()*window.innerHeight*.45+50; this.done=false;
      this.color=`hsl(${Math.random()*360},90%,65%)`;
    }
    update(p) {
      if(!this.done){ this.x+=this.vx; this.y+=this.vy;
        if(this.y<=this.targetY){ this.done=true;
          for(let i=0;i<Math.floor(Math.random()*60+80);i++) p.push(new FWParticle(this.x,this.y,this.color)); }
      }
    }
    draw(c) {
      if(!this.done){ c.globalAlpha=1; c.fillStyle=this.color; c.shadowColor=this.color; c.shadowBlur=10;
        c.beginPath(); c.arc(this.x,this.y,3,0,Math.PI*2); c.fill(); c.shadowBlur=0; }
    }
  }
  function fwLoop() {
    fwCtx.clearRect(0,0,fwCvs.width,fwCvs.height);
    rockets.forEach(r=>{ r.update(fwParts); r.draw(fwCtx); });
    rockets=rockets.filter(r=>!r.done);
    fwParts.forEach(p=>{ p.update(); p.draw(fwCtx); });
    fwParts=fwParts.filter(p=>p.alpha>.01);
    if(fwActive||rockets.length||fwParts.length) requestAnimationFrame(fwLoop);
    else fwCtx.clearRect(0,0,fwCvs.width,fwCvs.height);
  }
  function launchFireworks(count, interval) {
    fwActive=true; fwLoop();
    let n=0;
    for(let i=0;i<4;i++) setTimeout(()=>rockets.push(new Rocket()), i*220);
    const t=setInterval(()=>{ rockets.push(new Rocket()); n++; if(n>=count){ clearInterval(t); fwActive=false; } }, interval);
  }

  /* ── CONFETTI ── */
  const COLS=['#e8799a','#c9954c','#f0d080','#ffb3c6','#fff','#b388ff','#80d8ff'];
  let cfParts=[], cfActive=false;
  class CF {
    constructor(left) {
      const W=window.innerWidth;
      this.x=left?Math.random()*W*.2:W-Math.random()*W*.2; this.y=-20;
      this.vx=(left?3:-3)+(Math.random()-.5)*4; this.vy=Math.random()*3+3;
      this.rot=Math.random()*360; this.rv=(Math.random()-.5)*10;
      this.color=COLS[Math.floor(Math.random()*COLS.length)];
      this.w=Math.random()*12+6; this.h=Math.random()*6+4; this.alpha=1;
    }
    update() { this.x+=this.vx; this.y+=this.vy; this.vy+=.07; this.rot+=this.rv; if(this.y>window.innerHeight*.8) this.alpha-=.02; }
    draw(c) {
      c.save(); c.translate(this.x,this.y); c.rotate(this.rot*Math.PI/180);
      c.globalAlpha=Math.max(0,this.alpha); c.fillStyle=this.color;
      c.fillRect(-this.w/2,-this.h/2,this.w,this.h); c.restore();
    }
  }
  function cfLoop() {
    cfCtx.clearRect(0,0,cfCvs.width,cfCvs.height);
    cfParts.forEach(p=>{ p.update(); p.draw(cfCtx); });
    cfParts=cfParts.filter(p=>p.alpha>0&&p.y<window.innerHeight+40);
    if(cfActive||cfParts.length) requestAnimationFrame(cfLoop);
    else cfCtx.clearRect(0,0,cfCvs.width,cfCvs.height);
  }
  function launchConfetti(initial) {
    cfActive=true; cfLoop();
    for(let i=0;i<(initial?80:120);i++) { cfParts.push(new CF(true)); cfParts.push(new CF(false)); }
    setTimeout(()=>{ cfActive=false; }, initial?4000:6000);
  }

  /* ── BALLOONS ── */
  const BAL=['🎈','🎈','🎀','🎊','🎉'];
  const balEl=document.getElementById('balloons');
  function mkBalloon() {
    const el=document.createElement('div'); el.className='balloon';
    el.textContent=BAL[Math.floor(Math.random()*BAL.length)];
    el.style.cssText=`left:${Math.random()*100}vw;font-size:${Math.random()*1.5+1.5}rem;animation-duration:${Math.random()*10+12}s;animation-delay:${Math.random()*5}s;`;
    balEl.appendChild(el); setTimeout(()=>el.remove(),18000);
  }
  function startBalloons() { for(let i=0;i<8;i++) setTimeout(mkBalloon,i*600); setInterval(mkBalloon,2500); }

  /* ── PARTICLES ── */
  const parEl=document.getElementById('particles');
  function mkParticle() {
    const el=document.createElement('div'); el.className='particle';
    const s=Math.random()*8+3;
    el.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;bottom:-10px;animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*5}s;`;
    parEl.appendChild(el); setTimeout(()=>el.remove(),20000);
  }
  function startParticles() { for(let i=0;i<12;i++) setTimeout(mkParticle,i*400); setInterval(mkParticle,1200); }

  /* ── PETALS ── */
  const PET=['🌸','🌺','🌹','🌷'];
  const petEl=document.getElementById('petals');
  function mkPetal() {
    const el=document.createElement('div'); el.className='petal';
    el.textContent=PET[Math.floor(Math.random()*PET.length)];
    el.style.cssText=`left:${Math.random()*100}vw;animation-duration:${Math.random()*8+8}s;animation-delay:${Math.random()*4}s;`;
    petEl.appendChild(el); setTimeout(()=>el.remove(),16000);
  }
  function startPetals() { for(let i=0;i<10;i++) setTimeout(mkPetal,i*500); setInterval(mkPetal,1800); }

  /* ── GO TO LETTER PAGE ── */
  document.getElementById('go-letter').addEventListener('click', () => {
    document.getElementById('page1').classList.add('go-out');
    // Store flag so letter page knows music is on
    sessionStorage.setItem('musicOn', musicOn ? '1' : '0');
    sessionStorage.setItem('musicTime', music.currentTime);
    setTimeout(() => { window.location.href = 'letter.html'; }, 680);
  });
  </script>
</body>
</html>
